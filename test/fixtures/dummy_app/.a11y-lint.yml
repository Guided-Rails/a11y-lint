# All rules enabled by default.
# Uncomment to disable a rule:
#
# ImgMissingAlt:
#   Enabled: false
#
# ImageTagMissingAlt:
#   Enabled: false
#
# LinkToMissingAccessibleName:
#   Enabled: false
#
# ButtonTagMissingAccessibleName:
